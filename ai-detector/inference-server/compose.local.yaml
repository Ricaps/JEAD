services:
  inference-server-cpu:
    build:
      context: .
    ports:
      - "8081:8080"
    environment:
      ADDRESS: 0.0.0.0
      PORT: 8080
      MODELS_ROOT: /usr/models
      PIP_CACHE_DIR: /root/.cache/pip
    volumes:
      - type: bind
        source: ${MODELS_ROOT_HOST}
        target: ${MODELS_ROOT}
      - pip-cache:/root/.cache/pip

volumes:
  pip-cache:
