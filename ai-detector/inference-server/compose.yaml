services:
  inference-server-cpu:
    image: ricaps/jead:latest
    pull_policy: always
    ports:
      - "8090:8080"
    environment:
      ADDRESS: 0.0.0.0
      PORT: 8080
      MODELS_ROOT: /usr/models
      PIP_CACHE_DIR: /root/.cache/pip
    volumes:
      - "${MODELS_ROOT_HOST}:/usr/models"
      - pip-cache:/root/.cache/pip

volumes:
  pip-cache: