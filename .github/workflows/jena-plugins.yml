name: Build & Release Jena plugins
on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: maven

      - name: Calculate Version
        run: |
          chmod +x .github/scripts/calculate-version.sh
          .github/scripts/calculate-version.sh

      - name: Run integration tests
        working-directory: ./build-plugins
        run: ../mvnw --batch-mode verify

      - name: Publish jena-plugin-core & jena-maven-plugin
        working-directory: ./build-plugins
        run: |
          ../mvnw versions:set -DnewVersion=${{ env.VERSION }} -DgenerateBackupPoms=false
          ../mvnw --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}