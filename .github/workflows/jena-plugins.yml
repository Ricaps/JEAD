name: Build & Release Jena plugins
on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
jobs:
  build-and-publish-maven:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Calculate Version
        run: |
          chmod +x .github/scripts/calculate-version.sh
          .github/scripts/calculate-version.sh

      - name: Run integration tests
        working-directory: ./build-plugins
        run: ../mvnw --batch-mode verify

      - name: Publish jena-plugin-core & jena-maven-plugin
        working-directory: ./build-plugins
        run: |
          ../mvnw --batch-mode versions:set -DnewVersion=${{ env.VERSION }} -DgenerateBackupPoms=false
          ../mvnw --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-publish-gradle:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Calculate Version
        run: |
          chmod +x .github/scripts/calculate-version.sh
          .github/scripts/calculate-version.sh

      - name: Setup Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Run tests
        working-directory: ./build-plugins/jena-gradle-plugin
        run: ./gradlew test --no-daemon

      - name: Publish jena-gradle-plugin
        working-directory: ./build-plugins/jena-gradle-plugin
        run: ./gradlew publish -x test -Pversion=${{ env.VERSION }} --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}