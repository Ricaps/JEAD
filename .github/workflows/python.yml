name: Python AiDetector Tests
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "poetry"
      - name: Install dependencies
        working-directory: ./AiDetector/training
        run: |
          poetry install
      - name: Run tests using unittest
        working-directory: ./AiDetector/training
        run: poetry run python -m unittest discover -s tests -p 'test_*.py' -v
