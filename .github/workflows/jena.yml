name: Java CI with Maven

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  M2_CACHE_KEY: m2-${{ github.sha }}
  BUILD_PLUGINS_DIRECTORY: ./build-plugins

jobs:
  build-and-publish-jena-plugins:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Setup permissions for Maven & Gradle Wrappers
        run: |
          find . -type f -name mvnw -exec chmod +x {} +
          find . -type f -name gradlew -exec chmod +x {} +

      - name: Cache Maven local
        uses: actions/cache@v5.0.2
        with:
          path: ~/.m2
          key: ${{ env.M2_CACHE_KEY }}-${{ github.run_id }}-${{ github.job }}
          restore-keys: ${{ env.M2_CACHE_KEY }}
          
      - name: Calculate Version
        run: |
          chmod +x .github/scripts/calculate-version.sh
          .github/scripts/calculate-version.sh

      - name: Set the plugins version
        working-directory: ${{ env.BUILD_PLUGINS_DIRECTORY }}
        run: ../mvnw --batch-mode versions:set -DnewVersion=${{ env.VERSION }} -DgenerateBackupPoms=false

      - name: Run integration tests & install
        working-directory: ${{ env.BUILD_PLUGINS_DIRECTORY }}
        run: ../mvnw --batch-mode install
      
      - name: Publish jena-plugin-core & plugins
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ${{ env.BUILD_PLUGINS_DIRECTORY }}
        run: ../mvnw --batch-mode deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        

  build-jena:
    needs:
      - build-and-publish-jena-plugins
    permissions:
      checks: write
      contents: write

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Calculate Version
      run: |
        chmod +x .github/scripts/calculate-version.sh
        .github/scripts/calculate-version.sh

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: maven

    - name: Cache Maven local
      uses: actions/cache@v5.0.2
      with:
        path: ~/.m2
        key: ${{ env.M2_CACHE_KEY }}-${{ github.run_id }}-${{ github.job }}
        restore-keys: ${{ env.M2_CACHE_KEY }}

    - name: Setup permissions for Maven & Gradle Wrappers
      run: |
        find . -type f -name mvnw -exec chmod +x {} +
        find . -type f -name gradlew -exec chmod +x {} +

    - name: Set Versions of project
      run: ./mvnw --batch-mode versions:set -DnewVersion=${{ env.VERSION }} -DgenerateBackupPoms=false

    - name: Build Maven projects
      run: ./mvnw -B package --file pom.xml -DskipTests

    - name: Run unit tests
      working-directory: ./detector
      run: ../mvnw --batch-mode test

    - name: Run integration tests
      working-directory: ./detector
      run: ../mvnw --batch-mode verify -DskipUnitTests

    - name: Publish surefire results
      if: success() || failure()
      uses: scacap/action-surefire-report@v1
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

    - name: Publish failsafe results
      if: success() || failure()
      uses: scacap/action-surefire-report@v1
      with:
        report_paths: '**/target/failsafe-reports/TEST-*.xml'

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v3
      with:
        ignore-maven-wrapper: 'true'
