# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    permissions:
      checks: write
      contents: write

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'oracle'
        cache: maven
    - name: Build Maven projects
      run: mvn -B package --file pom.xml -DskipTests

    - name: Build TestGradle project
      working-directory: ./TestGradleProject
      run: ./gradlew build --no-daemon && ./gradlew copyDeps

    - name: Run unit tests
      working-directory: ./detector
      run: mvn --batch-mode test

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v1

    - name: Run integration tests
      working-directory: ./detector
      run: mvn --batch-mode verify -DskipUnitTests

    - name: Publish surefire results
      if: success() || failure()
      uses: scacap/action-surefire-report@v1
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'

    - name: Publish failsafe results
      if: success() || failure()
      uses: scacap/action-surefire-report@v1
      with:
        report_paths: '**/target/failsafe-reports/TEST-*.xml'

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@v3
      with:
        ignore-maven-wrapper: 'true'
