spring:
  datasource:
    username: root
    password: detector
    url: jdbc:postgresql://localhost:5431/antipatternDetector
  jpa:
    show-sql: false
    generate-ddl: true
    properties:
      hibernate:
        ddl-auto: create
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  grpc:
    client:
      channels:
        inference-server:
          address: localhost:8081
  shell:
    interactive:
      enabled: true
  threads:
    virtual:
      enabled: true

inference:
  enabled: true
  models:
    - &comments-model
      model-name: comments-model
      batch-size: 30
      batch-period: 100
    - &god-di-model
      model-name: god-di-model
      batch-size: 30
      batch-period: 100
    - &multi-service-model
      model-name: multi-service-model
      batch-size: 30
      batch-period: 100

  detectors:
  - detector-name: technical-debt
    extractor: comments
    model: *comments-model
    evaluations:
      - label-name: "technical_debt"
        threshold: 0.8
        issue-type: SELF_ADMITTED_TECHNICAL_DEBT
      - label-name: "code_comment"
        threshold: 0.8
        issue-type: COMMENTED_OUT_CODE

  - detector-name: god-di
    extractor: god-metrics
    model: *god-di-model
    evaluations:
      - label-name: "god_di"
        threshold: 1
        issue-type: GOD_DI_CLASS

  - detector-name: multi-service
    extractor: multi-service
    model: *multi-service-model
    evaluations:
      - label-name: "multi_service"
        threshold: 1
        issue-type: MULTI_SERVICE

prepare-plugin:
  maven-plugin:
    group-id: "cz.muni.fi.jead"
    artifact-id: "jead-maven-plugin"
    version: @project.version@
  gradle-plugin:
    group-id: "cz.muni.fi.jead"
    artifact-id: "jead-gradle-plugin"
    version: @project.version@
    plugin-id: "jead-gradle-plugin"
  repository:
    id: jead-github
    url: https://x-access-token:${prepare-plugin.repository.access-token}@maven.pkg.github.com/Ricaps/JEAD
    # Personal Access Token (classic) with read:packages scope is required to access the GitHub Packages repository
    # See more in README.md or at https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens#creating-a-personal-access-token-classic
    access-token: your_personal_access_token_here
