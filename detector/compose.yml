services:
  db:
    image: postgres:17-alpine3.23
    restart: always
    environment:
      POSTGRES_PASSWORD: detector
      POSTGRES_USER: root
      POSTGRES_DB: antipatternDetector
    ports:
      - "5431:5432"
    volumes:
      - dbVolume:/var/lib/postgresql/data
volumes:
  dbVolume:
    driver: local
