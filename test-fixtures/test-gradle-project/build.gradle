apply plugin: 'java'

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}


repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    implementation group: 'org.slf4j', name: 'slf4j-api', version: '1.7.25'
    implementation group: 'org.slf4j', name: 'slf4j-simple', version: '1.7.25'
}

// Jena build script

buildscript {
    println "Using Jena plugin version: $version"

    repositories {
        mavenLocal()
        maven {
            name = "jead-github"
            url = uri('https://x-access-token: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@maven.pkg.github.com/Ricaps/Jead')
        }
    }

    dependencies {
        classpath("cz.muni.fi.jead:jead-gradle-plugin:$version") {
            changing = true
        }
    }
    configurations.classpath {
        resolutionStrategy.cacheChangingModulesFor 0, 'seconds'
    }
}

allprojects {
    apply plugin: 'jead-gradle-plugin'

    jeadDelombok.dependsOn compileJava
}
// End of jena build script